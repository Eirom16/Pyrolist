app-id: org.pyrolist.Pyrolist
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: pyrolist

finish-args:
  - --share=ipc
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.mpris.MediaPlayer2.pyrolist
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=xdg-music:ro

modules:
  - name: vlc
    buildsystem: autotools
    sources:
      - type: archive
        url: https://download.videolan.org/pub/videolan/vlc/3.0.21/vlc-3.0.21.tar.xz
        sha256: SKIP

  - name: python3-deps
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --prefix=/app
          PySide6>=6.7.0 qasync qt-material
          ytmusicapi yt-dlp python-vlc
          "sqlalchemy[asyncio]" aiosqlite alembic
          pydantic tomli-w "httpx[http2]"
          syncedlyrics pylast pypresence
          pystray pillow loguru

  - name: pyrolist
    buildsystem: simple
    build-commands:
      - install -dm755 /app/lib/pyrolist
      - cp -r src/pyrolist /app/lib/pyrolist/app
      - cp -r assets /app/lib/pyrolist/assets
      - install -Dm755 pyrolist-launcher.sh /app/bin/pyrolist
      - install -Dm644 packaging/pyrolist.desktop /app/share/applications/org.pyrolist.Pyrolist.desktop
      - install -Dm644 assets/icon.png /app/share/icons/hicolor/256x256/apps/org.pyrolist.Pyrolist.png
    sources:
      - type: dir
        path: ../../
